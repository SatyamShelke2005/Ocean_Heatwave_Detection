name: Update Leaderboard

on:
  pull_request:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Run evaluation
      run: python evaluate.py

    - name: Update CSV
      run: |
        name=$(jq -r '.name' result.json)
        acc=$(jq -r '.accuracy' result.json)
        f1=$(jq -r '.f1' result.json)
        pr=${{ github.event.pull_request.number }}

        echo "$name,$acc,$f1,#$pr" >> leaderboard.csv

    - name: Commit
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"
        git add leaderboard.csv
        git commit -m "update leaderboard" || echo "no change"
        git push
