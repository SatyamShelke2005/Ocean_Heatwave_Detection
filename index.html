<!DOCTYPE html>
<html>
<head>
  <title>Ocean Heatwave Leaderboard</title>

  <style>
  body {
    background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 40%, #022c43 100%);
    color: #f1f5f9;
  }
  <div class="wave"></div>

  .wave {
    position: fixed;
    top: 0;
    width: 200%;
    height: 120px;
    background: url("https://www.svgrepo.com/show/365880/wave.svg") repeat-x;
    opacity: 0.2;
    animation: waveMove 10s linear infinite;
    z-index: -1;
  }

  @keyframes waveMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
    
  <img src="https://i.imgur.com/8bKQ8uP.png" class="coral">
  .coral {
    position: fixed;
    bottom: 0;
    width: 100%;
    opacity: 0.2;
    z-index: -1;
  }

  .wave, .coral {
    z-index: -1;   /* always behind everything */
    position: fixed;
  }

  h1 {
    color: white;
    margin-bottom: 40px;
  }

  /* TOP CARD */
  .top3 {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 50px;
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    width: 260px;   /* increased */
    margin: auto;
    text-align: center;
    color: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  .gold {
    border-top: 5px solid #facc15;
    transform: scale(1.12);
  }

  .silver {
    border-top: 5px solid #94a3b8;
  }

  .bronze {
    border-top: 5px solid #b45309;
  }
    
  .card h3 {
    margin: 10px 0;
  }

  /* TABLE */
  table {
    width: 80%;
    margin: auto;
    border-collapse: collapse;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  th {
    background: #667eea;
    color: white;
    padding: 12px;
  }

  td {
    padding: 12px;
  }

  tr:nth-child(even) {
    background: #f2f2f2;
  }

  tr:hover {
    background: #e0e7ff;
  }

</style>
</head>

<body>

<h1> 🌊 Ocean Heatwave Detection </h1>

<div class="top3" id="top3"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>F1 Score</th>
      <th>Accuracy</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
fetch('leaderboard.csv')
.then(res => res.text())
.then(data => {

  let rows = data.trim().split('\n').slice(1).filter(r => r.trim() !== "");

  let parsed = rows.map(r => {
    let [name, acc, f1] = r.split(',');

    return {
      name,
      acc: parseFloat(acc),
      f1: parseFloat(f1)
    };
  });

  if(parsed.length === 0) {
    document.body.innerHTML += "<h2>No data found</h2>";
    return;
  }

  // Sort by F1
  parsed.sort((a,b) => b.f1 - a.f1);

  // TOP 3 CARDS
  const topDiv = document.getElementById("top3");

  const medals = ["🥇","🥈","🥉"];
  const classes = ["gold","silver","bronze"];

  for(let i=0;i<3 && i<parsed.length;i++){
    let p = parsed[i];

    topDiv.innerHTML += `
      <div class="card ${classes[i]}">
        <h2>${medals[i]}</h2>
        <h3>${p.name}</h3>
        <p>F1: ${p.f1.toFixed(3)}</p>
        <p>Acc: ${p.acc.toFixed(3)}</p>
      </div>
    `;
  }

  // TABLE
  const table = document.getElementById("table");

  parsed.forEach((p,i)=>{
    let row = `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.f1.toFixed(3)}</td>
        <td>${p.acc.toFixed(3)}</td>
      </tr>
    `;
    table.innerHTML += row;
  });

});
</script>

</body>
</html>
