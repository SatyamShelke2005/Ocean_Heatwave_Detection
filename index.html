<!DOCTYPE html>
<html>
<head>
  <title>Ocean Heatwave Leaderboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f7fa;}
    h1 { text-align:center; }

    .cards { display:flex; gap:20px; margin-bottom:20px;}
    .card { flex:1; background:white; padding:15px; border-radius:10px; text-align:center;}

    table { width:100%; border-collapse: collapse; background:white;}
    th, td { padding:10px; text-align:center; }
    th { background:#eee; }
  </style>
</head>

<body>

<h1>🏆 Ocean Heatwave Challenge</h1>

<div class="cards">
  <div class="card" id="teams"></div>
  <div class="card" id="best"></div>
  <div class="card" id="avg"></div>
</div>

<table id="table">
<tr>
  <th>Rank</th>
  <th>Name</th>
  <th>F1 Score</th>
  <th>Accuracy</th>
  <th>PR</th>
</tr>
</table>

<script>
fetch('leaderboard.csv')
.then(res=>res.text())
.then(data=>{
  let rows = data.split('\n').slice(1).filter(r=>r.trim()!="");

  let parsed = rows.map(r=>{
    let [name,acc,f1,pr]=r.split(',');
    return {name, acc:+acc, f1:+f1, pr};
  });

  parsed.sort((a,b)=>b.f1-a.f1);

  document.getElementById("teams").innerHTML = "<h2>"+parsed.length+"</h2>Teams";
  document.getElementById("best").innerHTML = "<h2>"+parsed[0].f1+"</h2>Best F1";
  document.getElementById("avg").innerHTML = "<h2>"+(parsed.reduce((s,x)=>s+x.f1,0)/parsed.length).toFixed(3)+"</h2>Avg F1";

  let table=document.getElementById("table");

  parsed.forEach((r,i)=>{
    let tr=table.insertRow();

    let rank = i==0?"🥇":i==1?"🥈":i==2?"🥉":i+1;

    tr.insertCell(0).innerText=rank;
    tr.insertCell(1).innerText=r.name;
    tr.insertCell(2).innerText=r.f1;
    tr.insertCell(3).innerText=r.acc;
    tr.insertCell(4).innerHTML="<a href='#'>"+r.pr+"</a>";
  });
});
</script>

</body>
</html>
