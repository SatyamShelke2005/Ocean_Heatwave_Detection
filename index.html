<!DOCTYPE html>
<html>
<head>
  <title>Ocean Heatwave Leaderboard</title>

  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 20px;
    text-align: center;
    color: #333;
  }

  h1 {
    color: white;
    margin-bottom: 40px;
  }

  /* TOP CARD */
  .top3 {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 50px;
  }

  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    width: 220px;
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
  }

  .card:hover {
    transform: translateY(-8px);
  }

  .gold {
    border-top: 6px solid gold;
    transform: scale(1.1);
  }

  .silver { border-top: 6px solid silver; }
  .bronze { border-top: 6px solid #cd7f32; }

  .card h3 {
    margin: 10px 0;
  }

  /* TABLE */
  table {
    width: 80%;
    margin: auto;
    border-collapse: collapse;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  th {
    background: #667eea;
    color: white;
    padding: 12px;
  }

  td {
    padding: 12px;
  }

  tr:nth-child(even) {
    background: #f2f2f2;
  }

  tr:hover {
    background: #e0e7ff;
  }

</style>
</head>

<body>

<h1>🏆 Ocean Heatwave Challenge</h1>

<div class="top3" id="top3"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>F1 Score</th>
      <th>Accuracy</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
fetch('leaderboard.csv')
.then(res => res.text())
.then(data => {

  let rows = data.trim().split('\n').slice(1).filter(r => r.trim() !== "");

  let parsed = rows.map(r => {
    let [name, acc, f1] = r.split(',');

    return {
      name,
      acc: parseFloat(acc),
      f1: parseFloat(f1)
    };
  });

  if(parsed.length === 0) {
    document.body.innerHTML += "<h2>No data found</h2>";
    return;
  }

  // Sort by F1
  parsed.sort((a,b) => b.f1 - a.f1);

  // TOP 3 CARDS
  const topDiv = document.getElementById("top3");

  const medals = ["🥇","🥈","🥉"];
  const classes = ["gold","silver","bronze"];

  for(let i=0;i<3 && i<parsed.length;i++){
    let p = parsed[i];

    topDiv.innerHTML += `
      <div class="card ${classes[i]}">
        <h2>${medals[i]}</h2>
        <h3>${p.name}</h3>
        <p>F1: ${p.f1.toFixed(3)}</p>
        <p>Acc: ${p.acc.toFixed(3)}</p>
      </div>
    `;
  }

  // TABLE
  const table = document.getElementById("table");

  parsed.forEach((p,i)=>{
    let row = `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.f1.toFixed(3)}</td>
        <td>${p.acc.toFixed(3)}</td>
      </tr>
    `;
    table.innerHTML += row;
  });

});
</script>

</body>
</html>
