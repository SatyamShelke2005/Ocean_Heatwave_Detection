<!DOCTYPE html>
<html>
<head>
  <title>Ocean Heatwave Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(60deg, #543ab7, #00acc1);
      color: white;
      text-align: center;
    }

    .header {
      position: relative;
    }

    .inner-header {
      padding: 50px 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    /* Leaderboard box */
    .leaderboard-container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      max-width: 800px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px;
      background: rgba(255,255,255,0.2);
    }

    td {
      padding: 12px;
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    tr:nth-child(even) {
      background: rgba(255,255,255,0.05);
    }

    /* Waves */
    .waves {
      position: relative;
      width: 100%;
      height: 15vh;
      margin-bottom: -7px;
      min-height: 100px;
      max-height: 150px;
    }

    .parallax > use {
      animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
    }

    .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
    .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
    .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
    .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

    @keyframes move-forever {
      0% { transform: translate3d(-90px,0,0); }
      100% { transform: translate3d(85px,0,0); }
    }

    @media (max-width: 768px) {
      .waves { height: 40px; min-height: 40px; }
    }
  </style>
</head>

<body>

<div class="header">

  <div class="inner-header">
    <h1>🌊 Ocean Heatwave Leaderboard</h1>

    <div class="leaderboard-container">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>User</th>
            <th>Accuracy</th>
            <th>F1 Score</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

  <!-- Waves -->
  <div>
    <svg class="waves" xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      viewBox="0 24 150 28" preserveAspectRatio="none">

      <defs>
        <path id="gentle-wave"
          d="M-160 44c30 0 58-18 88-18s58 18 88 18
             58-18 88-18 58 18 88 18 v44h-352z" />
      </defs>

      <g class="parallax">
        <use xlink:href="#gentle-wave" x="48" y="0"
          fill="rgba(255,255,255,0.7)" />
        <use xlink:href="#gentle-wave" x="48" y="3"
          fill="rgba(255,255,255,0.5)" />
        <use xlink:href="#gentle-wave" x="48" y="5"
          fill="rgba(255,255,255,0.3)" />
        <use xlink:href="#gentle-wave" x="48" y="7"
          fill="#ffffff" />
      </g>

    </svg>
  </div>

</div>

<script>
fetch('leaderboard.csv')
.then(res => res.text())
.then(data => {

  let rows = data.trim().split('\n').slice(1).filter(r => r.trim() !== "");

  let parsed = rows.map(r => {
    let [name, acc, f1] = r.split(',');
    return {
      name,
      acc: parseFloat(acc),
      f1: parseFloat(f1)
    };
  });

  parsed.sort((a,b) => b.f1 - a.f1);

  const table = document.getElementById("table");

  parsed.forEach((p,i)=>{
    let row = `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.acc.toFixed(3)}</td>
        <td>${p.f1.toFixed(3)}</td>
      </tr>
    `;
    table.innerHTML += row;
  });

});
</script>

</body>
</html>
